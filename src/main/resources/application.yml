# ============================================================
# 数据中心智能运维支撑平台 - 本地开发配置
# ============================================================
# 说明：
# 1. 第二阶段切换为 MySQL + MyBatis-Plus，正式对接真实数据库。
# 2. spring.sql.init 保留，启动时仍会执行 schema.sql 和 data.sql 初始化结构和数据。
# 3. MyBatis-Plus 逻辑删除、驼峰映射等全局配置统一在 mybatis-plus 节配置。

server:
  port: 8081

spring:
  application:
    name: datacenter-ops-platform

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ops_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456

  sql:
    init:
      # always：每次启动都执行，保证本地开发环境数据稳定可复现。
      # 生产环境应改为 never，由 Flyway/Liquibase 管理变更。
      mode: always
      # 指定 schema 和 data 脚本路径（默认就是这两个，显式写出更清晰）
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  configuration:
    # 开启驼峰命名自动映射：数据库 real_name -> Java realName
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 逻辑删除字段名（对应各表的 deleted 列）
      logic-delete-field: deleted
      # 未删除的值
      logic-not-delete-value: 0
      # 已删除的值
      logic-delete-value: 1

app:
  jwt:
    secret: local-demo-secret-change-me-local-demo-secret
    expire-minutes: 120
